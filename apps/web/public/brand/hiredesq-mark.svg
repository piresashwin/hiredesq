<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 32" fill="none" role="img" aria-label="Hiredesq">
  <!-- Hiredesq "Clarity Engine" mark, standalone (no wordmark) — brand-identity.md.
       Literal hex (no Tailwind tokens / currentColor): ink #1A1A2E, brand green
       #2F6F5E, faint #A3A3AD. Scattered faint dots flow IN from the left (messy
       inputs) and resolve to connected brand-green nodes OUT to the right. -->

  <!-- Left — chaos: scattered, loose dots (faint = unstructured input) -->
  <g fill="#A3A3AD">
    <circle cx="4" cy="9" r="1.4" />
    <circle cx="8.5" cy="22" r="1.7" />
    <circle cx="3" cy="24" r="1.1" />
    <circle cx="11" cy="15" r="1.2" />
  </g>

  <!-- Center — the engine: a ring with the H, in ink -->
  <g stroke="#1A1A2E">
    <circle cx="24" cy="16" r="9.5" stroke-width="2" />
    <g stroke-width="2.4" stroke-linecap="round">
      <line x1="20.5" y1="11.5" x2="20.5" y2="20.5" />
      <line x1="27.5" y1="11.5" x2="27.5" y2="20.5" />
      <line x1="20.5" y1="16" x2="27.5" y2="16" />
    </g>
  </g>

  <!-- Right — clarity: connected nodes resolving out, in brand green -->
  <g>
    <g stroke="#2F6F5E" stroke-width="1.5" stroke-linecap="round">
      <line x1="33.5" y1="16" x2="44" y2="16" />
      <line x1="44" y1="16" x2="39" y2="8.5" />
      <line x1="44" y1="16" x2="39" y2="23.5" />
    </g>
    <g fill="#2F6F5E">
      <circle cx="44" cy="16" r="2.4" />
      <circle cx="39" cy="8.5" r="2" />
      <circle cx="39" cy="23.5" r="2" />
    </g>
  </g>
</svg>
