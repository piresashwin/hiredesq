<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Clarity Engine mark, square crop for the favicon (brand-identity.md).
       Literal hex (static asset can't use Tailwind tokens): ink #1A1A2E,
       brand #2F6F5E, faint #A3A3AD. -->
  <g fill="#A3A3AD">
    <circle cx="3" cy="11" r="1.2" />
    <circle cx="5" cy="21" r="1.4" />
    <circle cx="2.5" cy="17" r="1" />
  </g>
  <g stroke="#1A1A2E">
    <circle cx="14" cy="16" r="8" stroke-width="2" />
    <g stroke-width="2.2" stroke-linecap="round">
      <line x1="11" y1="12.5" x2="11" y2="19.5" />
      <line x1="17" y1="12.5" x2="17" y2="19.5" />
      <line x1="11" y1="16" x2="17" y2="16" />
    </g>
  </g>
  <g>
    <g stroke="#2F6F5E" stroke-width="1.4" stroke-linecap="round">
      <line x1="22" y1="16" x2="29" y2="16" />
      <line x1="29" y1="16" x2="25" y2="10" />
      <line x1="29" y1="16" x2="25" y2="22" />
    </g>
    <g fill="#2F6F5E">
      <circle cx="29" cy="16" r="2" />
      <circle cx="25" cy="10" r="1.6" />
      <circle cx="25" cy="22" r="1.6" />
    </g>
  </g>
</svg>
