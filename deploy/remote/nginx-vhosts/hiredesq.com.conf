# hiredesq.com — sibling vhost served by the SHARED tradex nginx proxy.
#
# This file is NOT mounted from hiredesq's stack. deploy.sh copies it to
# /srv/nginx-vhosts on the droplet, which the tradex nginx mounts at
# /etc/nginx/vhosts and includes (see tradex deploy/remote/nginx/nginx.conf).
# That host dir lives OUTSIDE tradex's rsync tree, so tradex deploys won't delete it.
#
# Reachability: this proxy and hiredesq-web/-api share the external `edge` docker
# network. We resolve upstreams at request time via docker's embedded DNS
# (127.0.0.11) + variables, so the proxy keeps starting/serving even while the
# hiredesq stack is down or redeploying (a static `upstream` would make nginx
# fail to start if hiredesq containers were absent).

# Plain HTTP: serve the ACME challenge, redirect everything else to HTTPS.
server {
  listen 80;
  listen [::]:80;
  server_name hiredesq.com www.hiredesq.com;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://hiredesq.com$request_uri;
  }
}

server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name hiredesq.com www.hiredesq.com;

  ssl_certificate     /etc/letsencrypt/live/hiredesq.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/hiredesq.com/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 1d;

  # Bulk resume/folder uploads — match the api's fastify multipart limit.
  client_max_body_size 25m;

  # Redirect the www apex to the canonical host.
  if ($host = www.hiredesq.com) { return 301 https://hiredesq.com$request_uri; }

  # Runtime DNS resolution so this server block doesn't pin upstreams at startup.
  resolver 127.0.0.11 valid=30s;
  set $hd_web hiredesq-web:3000;
  set $hd_api hiredesq-api:3001;

  # REST API → api container. The api has no global prefix, so strip /api here
  # (matches next.config's /api/* rewrite which also strips it).
  location /api/ {
    rewrite ^/api/(.*)$ /$1 break;
    proxy_pass http://$hd_api;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Next.js (everything else).
  location / {
    proxy_pass http://$hd_web;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
