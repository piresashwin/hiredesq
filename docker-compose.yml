# Local dev infra only — Postgres (the pg-boss queue lives here too; no Redis).
# The apps run on the host via `pnpm dev` (turbo). Production uses
# deploy/remote/docker-compose.prod.yml.
#   pnpm dev:db   → bring this up
services:
  postgres:
    # pgvector/pgvector image = stock Postgres 16 + the `vector` extension (semantic
    # candidate search, §5). pg_trgm is bundled in this image too. Prod must use the
    # same image (see deploy/remote/docker-compose.prod.yml).
    image: pgvector/pgvector:pg16
    container_name: hiredesq-dev-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hiredesq
      POSTGRES_PASSWORD: hiredesq
      POSTGRES_DB: hiredesq
    ports:
      # host 5434 → container 5432 (5432 and 5433 are taken by other local projects)
      - "5434:5432"
    volumes:
      - hiredesq_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hiredesq -d hiredesq"]
      interval: 5s
      timeout: 5s
      retries: 10

  # S3-compatible object storage for uploaded resumes (Cloudflare R2 in prod).
  # Console at http://localhost:9001 (hiredesq / hiredesq-dev-secret).
  minio:
    image: minio/minio:latest
    container_name: hiredesq-dev-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: hiredesq
      MINIO_ROOT_PASSWORD: hiredesq-dev-secret
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # web console
    volumes:
      - hiredesq_minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: create the uploads bucket so dev works with zero manual setup.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 hiredesq hiredesq-dev-secret &&
      mc mb --ignore-existing local/hiredesq-uploads &&
      echo 'bucket ready';
      "

volumes:
  hiredesq_pg:
  hiredesq_minio:
